name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build + tests + lint sur desktop (Linux).
  check:
    name: Build & test (desktop)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer la toolchain Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # Dépendances système pour winit/wgpu/egui sur Linux.
      - name: Dépendances système
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxkbcommon-dev libwayland-dev \
            libasound2-dev libudev-dev pkg-config

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        run: cargo test --all-targets

  # Vérifie que la lib compile pour les cibles mobiles (build seul, pas de tests).
  cross-build:
    name: Build cross (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: aarch64-linux-android
          - os: macos-latest
            target: aarch64-apple-ios
          # Sprint 114 (défrichage) : build seul, pas de vérification visuelle en
          # CI — le premier rendu affiche encore un canvas noir (cf.
          # ROADMAP_SPRINTS.md), ce job garantit juste l'absence de régression de
          # compilation sur cette cible pendant que le rendu se répare.
          - os: ubuntu-latest
            target: wasm32-unknown-unknown
    steps:
      - uses: actions/checkout@v4

      - name: Installer la toolchain Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build lib pour ${{ matrix.target }}
        run: cargo build --lib --target ${{ matrix.target }}
