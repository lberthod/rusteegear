# wasm32 (Sprint 114) : `getrandom` 0.3 exige ce cfg en plus de sa feature Cargo
# `wasm_js` (déclarée dans Cargo.toml) — la feature seule ne suffit pas, cf.
# https://docs.rs/getrandom/latest/getrandom/#webassembly-support
[target.wasm32-unknown-unknown]
rustflags = ["--cfg", "getrandom_backend=\"wasm_js\""]
